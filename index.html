<!doctype html>
<html lang="zh-Hans" data-theme="light" data-font-size="medium">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="阿巴菲 - 米克洛什·约希卡 历史小说简体中文静态阅读网站"
    />
    <title>阿巴菲</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="progress" aria-hidden="true">
      <span id="progressBar"></span>
    </div>

    <button
      class="chapter-fab"
      type="button"
      id="chapterDrawerToggle"
      aria-controls="readerSidebar"
      aria-expanded="false"
      aria-label="打开章节目录"
    >
      <svg
        class="chapter-fab-icon"
        viewBox="0 0 24 24"
        aria-hidden="true"
        focusable="false"
      >
        <path d="M5 5.75c2.2-.6 4.08-.38 5.7.64v11.86c-1.62-1.02-3.5-1.24-5.7-.64z" />
        <path d="M19 5.75c-2.2-.6-4.08-.38-5.7.64v11.86c1.62-1.02 3.5-1.24 5.7-.64z" />
        <path d="M7.25 9.05h1.7" />
        <path d="M7.25 12h1.7" />
        <path d="M15.05 9.05h1.7" />
        <path d="M15.05 12h1.7" />
      </svg>
    </button>
    <div class="toc-backdrop" id="tocBackdrop" hidden></div>

    <header class="site-header">
      <a class="brand" href="#home" aria-label="回到首页">
        <span class="brand-mark">阿</span>
        <span>阿巴菲</span>
      </a>

      <nav class="top-nav" aria-label="主导航">
        <a href="#reader">阅读</a>
        <a href="#toc">目录</a>
        <a href="#about">关于</a>
      </nav>

      <div class="reader-controls" aria-label="阅读设置">
        <div class="segmented" aria-label="字号">
          <button type="button" data-font="small">小</button>
          <button type="button" data-font="medium">中</button>
          <button type="button" data-font="large">大</button>
        </div>
        <button class="theme-toggle" type="button" id="themeToggle" aria-label="切换主题">
          深色
        </button>
      </div>
    </header>

    <main>
      <section class="hero" id="home">
        <div class="hero-inner">
          <p class="meta-line" id="heroMeta">历史小说 / 匈牙利文学 / 长篇阅读</p>
          <h1 id="bookTitle"><span class="title-original">阿巴菲</span></h1>
          <p class="author" id="bookAuthor">米克洛什·约希卡</p>
          <p class="intro" id="bookDescription">
            正在载入书籍简介。
          </p>
          <div class="hero-actions">
            <a class="primary-link" href="#reader">开始阅读</a>
            <a class="secondary-link" href="#toc">查看目录</a>
          </div>
        </div>
      </section>

      <section class="overview" aria-label="书籍概览">
        <div class="overview-inner">
          <section class="overview-block" id="toc">
            <div class="section-heading">
              <span>目录</span>
              <button class="toc-toggle" type="button" id="tocToggle" aria-expanded="false">
                展开
              </button>
            </div>
            <nav class="toc-list home-toc" id="homeToc" aria-label="首页目录">
              <p class="muted">正在生成目录。</p>
            </nav>
          </section>

          <section class="overview-block" id="about">
            <h2>关于本书</h2>
            <p id="aboutText">
              这是一个为《阿巴菲》准备的简体中文静态阅读网站，适合后续继续增加译注、章节说明、人物表与历史背景。
            </p>
          </section>

          <section class="overview-block reserve-grid" aria-label="预留资料区域">
            <h2>资料区域</h2>
            <div class="reserve-items">
              <a href="#译者注释">译者注释</a>
              <a href="#人物表">人物表</a>
              <a href="#历史背景">历史背景</a>
              <a href="#版本说明">版本说明</a>
            </div>
          </section>
        </div>
      </section>

      <section class="reader-shell" id="reader">
        <aside class="reader-sidebar" id="readerSidebar" aria-label="阅读目录">
          <div class="sidebar-title">
            <span>章节目录</span>
            <div class="sidebar-actions">
              <span class="chapter-count" id="chapterCount">0</span>
              <button class="sidebar-close" type="button" id="chapterDrawerClose">关闭</button>
            </div>
          </div>
          <nav class="toc-list" id="readerToc" aria-label="阅读目录">
            <p class="muted">正在载入目录。</p>
          </nav>
        </aside>

        <article class="book-content" id="bookContent" aria-live="polite">
          <p class="loading">正在载入《阿巴菲》正文。</p>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        文本来源：
        <a href="https://mek.oszk.hu/03800/03850/03850.htm" rel="noopener" target="_blank">
          匈牙利电子图书馆
        </a>
        。本站为纯静态阅读页面。
      </p>
    </footer>

    <script src="app.js" defer></script>
  </body>
</html>
